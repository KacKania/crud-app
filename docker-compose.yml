services:
  mysql-book:
    image: mysql:8.0
    container_name: mysql-book
    restart: always
    environment:
      - MYSQL_DATABASE=book
      - MYSQL_ROOT_PASSWORD=mysql
    ports:
      - '3307:3306'
    volumes:
      - ./mysql-book/data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  app1:
    build: .
    container_name: app1
    depends_on:
      - mysql-book
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=obraz

  app2:
    build: .
    container_name: app2
    depends_on:
      - mysql-book
    expose:
      - "8080"
    environment:
      - SPRING_PROFILES_ACTIVE=obraz

  nginx:
    image: nginx:latest
    container_name: nginx-lb
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2